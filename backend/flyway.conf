# Flyway Configuration File
# ========================

# JDBC URL to use to connect to the database
flyway.url=jdbc:mysql://localhost:3306/your_database_name

# Database user
flyway.user=your_username

# Database password
flyway.password=your_password

# Locations to scan recursively for migrations
flyway.locations=filesystem:./migrations

# Schema to manage (default schema)
flyway.schemas=your_database_name

# Whether to automatically call baseline when migrate is executed against a non-empty schema
flyway.baselineOnMigrate=true

# The version to tag an existing schema with when executing baseline
flyway.baselineVersion=0

# Encoding of SQL migrations
flyway.encoding=UTF-8

# Whether to automatically call validate when performing a migration
flyway.validateOnMigrate=true

# Placeholders to replace in SQL migrations
# flyway.placeholders.database=your_database_name

# Target version up to which Flyway should consider migrations
# flyway.target=latest

# Whether to allow mixing transactional and non-transactional statements
flyway.mixed=false

# Whether to group all pending migrations together in the same transaction when applying them
flyway.group=false

# The file name prefix for versioned SQL migrations
flyway.sqlMigrationPrefix=V

# The file name separator for SQL migrations
flyway.sqlMigrationSeparator=__

# The file name suffixes for SQL migrations
flyway.sqlMigrationSuffixes=.sql

# Whether to ignore missing migrations when validating
flyway.ignoreMissingMigrations=false

# Whether to ignore ignored migrations when validating
flyway.ignoreIgnoredMigrations=false

# Whether to ignore pending migrations when validating
flyway.ignorePendingMigrations=false

# Whether to ignore future migrations when validating
flyway.ignoreFutureMigrations=true
